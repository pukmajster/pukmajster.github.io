<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Žan Pukmajster</title>

    <!-- CSS -->
    <link rel="stylesheet" href="index.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <script defer src="./scripts/project-card.js"></script>
  </head>

  <body>
    <main>
      <section id="Projects">
        <div
          style="
            margin-top: 2em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 1em;
          "
        >
          <p-home-button></p-home-button>
          <h2 class="TextPadding">My Work</h2>
        </div>

        <p-project-category
          label="Experience"
          no-padding="true"
        ></p-project-category>

        <p-project-card
          title="The Smartestway"
          job="Lead Frontend Developer"
          timeframe="2022 - present"
          about="The Smartestway is an education platform for learning and sharing study material."
          details="As the frontend lead, I set standards &
            guidelines, write core systems & features, maintain our custom UI
            library, develop various debugging tools, ..."
          stack="Next.js, React, TypeScript, Tailwind, TanStack, Zustand"
          app-url="https://app.thesmartestway.com/"
          landing-page-url="https://thesmartestway.com/"
        ></p-project-card>

        <p-project-card
          title="Bits & Bytes"
          job="Web Developer"
          timeframe="2019"
          about="Expanded an e-commerce website via Erasmus+ Internship in Malta."
          stack="PHP, MagentoDB"
          landing-page-url="https://bitsandbytesmalta.com/"
        ></p-project-card>

        <p-project-category label="Personal projects"></p-project-category>

        <p-project-card
          title="Bluthbaf"
          timeframe="2026"
          about="A simple 2D game, inspired by the popular video game Vampire Survivors."
          details="Video games are what got me into programming in the first place, and I was growing rather frustrated with the fact that I've yet to actually make a game myself.
            Bluthbaf is my attempt at breaking my barriers and finally making a game, any game, with all the game-dev knowledge I've accumulated over the years. This included creating a custom UI framework, entity attributes system, procedurally-generated deals, data-driven development workflow, etc. all within ~17 days of development. "
          stack="GameMaker Studio 2, GML"
          github-url="https://github.com/pukmajster/bluthbaf_docs"
          img="bluthbaf.png"
        ></p-project-card>

        <p-project-card
          title="Funky"
          timeframe="2023 - present"
          about="Funky is a web-based desktop app for managing addons in Valve's
            online video game Left 4 Dead 2."
          details="Being frustrated with the in-game addon manager, I went ahead and
            created an intuitive tool with user-convenience at the focus. Funky has over 3000 total downloads and 50 stars on GitHub. It is a project I'm very proud of."
          stack="Electron, Svelte, TypeScript, DexieDB, Skeleton UI, Tailwind"
          landing-page-url="https://pukmajster.github.io/funky/"
          github-url="https://github.com/pukmajster/funky"
          img="funky.png"
        ></p-project-card>

        <p-project-card
          title="VGUI Inspector"
          timeframe="2021"
          about="Simple web tool for previewing (and modifying) computed layouts of Valve's proprietary UI framework, VGUI."
          details="I wrote a parser for the VGUI script format and reverse-engineered the frameworks's layout composition logic in order to build a live-preview of the final result using simple HTML & CSS"
          stack="Svelte, TypeScript, Carbon UI"
          app-url="https://pukmajster.github.io/vgui-inspector/"
          github-url="https://github.com/pukmajster/vgui-inspector"
          img="vgui.png"
        ></p-project-card>

        <p-project-category label="Freelance"></p-project-category>

        <p-project-card
          title="Mestna zakladnica"
          timeframe="2021 - 2022"
          about="Mobile app that encourages users to explore the region of Šaleška
            dolina by letting users collect digital 'coins' once they arrive at
            specified points of interest."
          details="Alongside the Flutter mobile app, I also developed an admin dashboard that allowed admins to manage locations (categories, images, ...) through Firebase."
          stack="Flutter, Dart, Firebase, React, Material UI"
          landing-page-url="https://www.visitsaleska.si/sl/dozivetja/otrosko/mestna-zakladnica/"
        ></p-project-card>

        <p-project-card
          title="eVpis"
          timeframe="2021"
          about="eVpis is the official method of applying to the school of Šolski Center Velenje."
          details="Alongside the web-app, I also developed an admin dashboard for viewing signups and exporting."
          stack="React, TypeScript, Material UI, Firebase"
        ></p-project-card>

        <p-project-card
          title="Future X"
          timeframe="2021"
          about="Future X was an online industry techonology conference."
          details="I developed the frontend which included various micro-interactions that would trigger throughout the event."
          stack="React, TypeScript"
          landing-page-url="https://future-x.si/index.html"
        ></p-project-card>

        <p-project-card
          title="Galerija Velenje info-tablet app"
          timeframe="2021"
          about="A touch-screen friendly video-playing web-app that was used on the gallery's info tablets for an art showcase event."
          stack="React, TypeScript"
        >
        </p-project-card>

        <p-project-card
          title="Dan Odprtih Vrat"
          timeframe="2021"
          about="Another video-playing app, introducing students to various types of instruments and encouraging them to apply. Made for Velenje's music school, Glasbena Šola Fran Korun Koželjski Velenje."
          stack="React, TypeScript"
          app-url="https://odprta.gsvelenje.si/"
          landing-page-url="https://www.gsvelenje.si/sl/p/video/"
        >
        </p-project-card>

        <p-project-card
          title="SloCraft"
          timeframe="2021"
          about="SloCraft was a slovenian Minecraft server and community."
          details="I just made the landing page at the request of a couple of friends."
          stack="Svelte, TypeScript"
        ></p-project-card>

        <p-project-card
          title="SkillUp Mentor"
          timeframe="2021"
          about="I made the first landing page for SkillUp Mentor, a learning program for beginner coders."
          stack="React, Sass"
          landing-page-url="https://skillupmentor.com/"
        ></p-project-card>

        <p-project-card
          title="ERŠ LAN Party"
          timeframe="2020"
          about="The landing page for Šolski Center Velenje's 2020 LAN party event."
          details="I developed the landing page and was part of the organization team itself. I also made a custom component library for it, which haunted the next developer that took over the landing page the following year."
          stack="Node, Express, Nunjucks"
        ></p-project-card>

        <p-project-card
          title="PUD"
          timeframe="2019 - 2022"
          about="Document management web-app I developed for the school of Šolski Center Velenje that allows
            students to upload specified documents to management for them to
            view and verify."
          stack="React, Material UI, Sass"
        ></p-project-card>
      </section>

      <footer>
        <!-- <p>© 2026 Žan Pukmajster</p> -->
      </footer>

      <section id="Devroom" style="display: none">
        <h1>H1 heading</h1>
        <h2>H2 heading</h2>
        <h3>H3 heading</h3>
        <h4>H4 heading</h4>
        <h5>H5 heading</h5>
        <p>Paragraph</p>
      </section>
    </main>
  </body>
</html>
